esphome:
  name: mhi-redux-esp32-external-clock
  friendly_name: MHI Redux ESP32 External Clock FastGPIO TX Compile
  includes:
    - ../../../components/MhiAcCtrl/firmware_identity.h

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG
  baud_rate: 0

external_components:
  - source:
      type: local
      path: ../../../components
    components: [MhiAcCtrl]

MhiAcCtrl:
  id: mhi_ac
  frame_size: 33
  # Compile-test pins only. Change for real hardware.
  sck_pin: 8
  mosi_pin: 38
  miso_pin: 39
  rx_driver: external_clock_rx
  tx_driver: fast_gpio_tx
  # Hybrid path: external_clock_rx + fast_gpio TX.
  initial_vertical_vanes_position: 5
  initial_horizontal_vanes_position: 8
  room_temp_timeout: 60

climate:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    name: MHI Climate
    temperature_offset: false
    visual_min_temperature: 16
    visual_max_temperature: 31
    visual_temperature_step: 1

select:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    fan_speed:
      name: MHI Fan Speed
    vertical_vanes:
      name: MHI Vertical Vanes
    horizontal_vanes:
      name: MHI Horizontal Vanes

switch:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    vanes_3d_auto:
      name: MHI 3D Auto

sensor:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    room_temperature:
      name: MHI Room Temperature
    target_temperature:
      name: MHI Target Temperature

binary_sensor:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    power:
      name: MHI Power
    defrost:
      name: MHI Defrost

text_sensor:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    error_code:
      name: MHI Error Code
