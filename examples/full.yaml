substitutions:
  device_name: mhi-ac-ctrl
  friendly_name: MHI Air Conditioner

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1  # Change to match your ESP32 board
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  services:
    - service: set_external_room_temperature
      variables:
        temperature_value: float
      then:
        - climate.mhi.set_external_room_temperature:
            temperature: !lambda "return temperature_value;"

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source: github://Astute4185/MHI-AC-Ctrl-ESPHome_ESP-IDF@master
    components: [MhiAcCtrl]

MhiAcCtrl:
  # Verify this first if you see checksum/signature failures.
  frame_size: 33
  sck_pin: 14
  mosi_pin: 13
  miso_pin: 12
  initial_vertical_vanes_position: 5
  initial_horizontal_vanes_position: 8
  room_temp_timeout: 60

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

climate:
  - platform: MhiAcCtrl
    name: "${friendly_name}"
    temperature_offset: true
    visual_min_temperature: 17.0
    visual:
      temperature_step:
        target_temperature: 0.5
        current_temperature: 0.1

time:
  - platform: homeassistant
    id: homeassistant_time

binary_sensor:
  - platform: MhiAcCtrl
    defrost:
      name: "Defrost"
    vanes_3d_auto_enabled:
      name: "3D Auto Enabled"

sensor:
  - platform: uptime
    name: "Uptime"
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: MhiAcCtrl
    outdoor_temperature:
      name: "Outdoor Temperature"
    return_air_temperature:
      name: "Return Air Temperature"
    outdoor_unit_fan_speed:
      name: "Outdoor Unit Fan Speed"
    indoor_unit_fan_speed:
      name: "Indoor Unit Fan Speed"
    compressor_frequency:
      name: "Compressor Frequency"
    indoor_unit_total_run_time:
      name: "Indoor Unit Total Run Time"
    compressor_total_run_time:
      name: "Compressor Total Run Time"
    current_power:
      name: "Current Power"
    energy_used:
      name: "Energy Used"
    indoor_unit_thi_r1:
      name: "Indoor HE Temp 1"
    indoor_unit_thi_r2:
      name: "Indoor HE Temp 2"
    indoor_unit_thi_r3:
      name: "Indoor HE Temp 3"
    outdoor_unit_tho_r1:
      name: "Outdoor HE Temp"
    outdoor_unit_expansion_valve:
      name: "Outdoor Unit Expansion Valve"
    outdoor_unit_discharge_pipe:
      name: "Outdoor Unit Discharge Pipe"
    outdoor_unit_discharge_pipe_super_heat:
      name: "Outdoor Unit Discharge Pipe Super Heat"
    protection_state_number:
      name: "Compressor Protection Code"
    error_code:
      name: "Error Code"
    vanes_pos:
      name: "Vanes"
    vanesLR_pos:
      name: "Vanes Left-Right"

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP"
    ssid:
      name: "SSID"
    bssid:
      name: "BSSID"
  - platform: MhiAcCtrl
    protection_state:
      name: "Compressor Protection Status"

select:
  - platform: MhiAcCtrl
    vertical_vanes:
      name: "Vanes Up-Down"
    horizontal_vanes:
      name: "Vanes Left-Right"
    fan_speed:
      name: "Fan Speed"

switch:
  - platform: MhiAcCtrl
    vanes_3d_auto:
      name: "3D Auto"
