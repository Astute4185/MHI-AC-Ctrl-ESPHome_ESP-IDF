substitutions:
  device_name: mhi-ac-ctrl
  friendly_name: MHI Air Conditioner

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1  # Change to match your ESP32 board
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source: github://Astute4185/MHI-AC-Ctrl-ESPHome_ESP-IDF@master
    components: [MhiAcCtrl]

MhiAcCtrl:
  frame_size: 33
  sck_pin: 14
  mosi_pin: 13
  miso_pin: 12

globals:
  - id: grid_voltage
    type: int
    restore_value: no
    initial_value: "230"

climate:
  - platform: MhiAcCtrl
    name: "${friendly_name}"
    on_control:
      - logger.log: "Control input received; resetting derived power"
      - sensor.template.publish:
          id: power
          state: 0

sensor:
  - platform: MhiAcCtrl
    current_power:
      name: "Current Power"
      id: ac_current_power
      on_value:
        then:
          - sensor.template.publish:
              id: power
              state: !lambda "return id(ac_current_power).state * id(grid_voltage);"
  - platform: template
    name: "MHI Current Power"
    id: power
    unit_of_measurement: W
    icon: mdi:lightning-bolt
  - platform: total_daily_energy
    name: "MHI Daily Energy"
    power_id: power
    filters:
      - multiply: 0.001
      - throttle: 300s
    unit_of_measurement: kWh
    method: left
    icon: mdi:lightning-bolt

select:
  - platform: MhiAcCtrl
    vertical_vanes:
      name: "Vanes Up-Down"
    horizontal_vanes:
      name: "Vanes Left-Right"

switch:
  - platform: MhiAcCtrl
    vanes_3d_auto:
      name: "3D Auto"
