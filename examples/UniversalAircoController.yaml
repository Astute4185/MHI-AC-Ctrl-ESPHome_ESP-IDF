substitutions:
  device_name: airco-ctrl
  friendly_name: Airco Controller

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/Astute4185/MHI-AC-Ctrl-ESPHome_ESP-IDF
      ref: ESP-IDF-Redux
    components: [MhiAcCtrl]

MhiAcCtrl:
  id: mhi_ac
  # Set to 20 for older units.
  # Set to 33 for newer WF-RAC compatible units that expose 3D Auto and left/right vanes.
  # If you see checksum/signature failures, verify frame_size first.
  frame_size: 33
  # Update these pins to match your hardware.
  sck_pin: 14
  mosi_pin: 13
  miso_pin: 12
  # FastGPIO is the currently validated transport backend.
  # Keeping it explicit makes future driver/backend testing easier.
  rx_driver: fast_gpio_rx
  tx_driver: fast_gpio_tx
climate:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    name: "${friendly_name}"

select:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    vertical_vanes:
      name: "Vanes Up-Down"
    horizontal_vanes:
      name: "Vanes Left-Right"

switch:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    vanes_3d_auto:
      name: "3D Auto"

sensor:
  - platform: MhiAcCtrl
    mhi_ac_ctrl_id: mhi_ac
    outdoor_temperature:
      name: "Outdoor Temperature"
