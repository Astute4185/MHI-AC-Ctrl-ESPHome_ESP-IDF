# Experimental dual-worker config.
#
# Required:
#   frame_size
#   sck_pin
#   mosi_pin
#   miso_pin
#
# Optional but recommended for this test:
#   rx_driver: external_clock_rx
#   tx_driver: fast_gpio_tx
#   tx_background_interval_ms: 1000
#
# Optional worker settings:
#   rx_worker: true
#   tx_worker: true
#
# Optional tuning settings:
#   *_start_delay_ms
#   *_stack_size
#   *_priority
#   *_core_id
#
# Defaults remain conservative:
#   rx_worker: false
#   tx_worker: false
#
# Notes:
#   - rx_worker only captures/syncs/classifies/catalogs RX frames.
#   - tx_worker owns bus-marker TX flushing.
#   - ESPHome main loop handles decode/publish/queue only.
#   - Use this on dual-core ESP32 / ESP32-S3 targets.
#   - Treat this as experimental until soak tested on your board/unit.

MhiAcCtrl:
  id: mhi_ac

  # Required bus/frame config.
  frame_size: 33
  sck_pin: 33
  mosi_pin: 25
  miso_pin: 21

  # Optional transport selection.
  #
  # Stable/default:
  #   rx_driver: fast_gpio_rx
  #   tx_driver: fast_gpio_tx
  #
  # Experimental external-clock RX:
  #   rx_driver: external_clock_rx
  #   tx_driver: fast_gpio_tx
  rx_driver: external_clock_rx
  tx_driver: fast_gpio_tx

  # Optional.
  # Recommended on ESP32/Atom-class boards to reduce background/opdata TX pressure.
  tx_background_interval_ms: 1000

  # Optional RX worker.
  #
  # Default:
  #   rx_worker: false
  #
  # When true, RX capture/sync/classify/catalog moves out of the main loop.
  rx_worker: true

  # Optional RX worker tuning.
  # These can usually be omitted unless testing worker timing/stability.
  rx_worker_start_delay_ms: 5000
  rx_worker_stack_size: 6144
  rx_worker_priority: 4
  rx_worker_core_id: 0

  # Optional TX worker.
  #
  # Default:
  #   tx_worker: false
  #
  # When true, TX bus-marker flushing moves out of the main loop.
  tx_worker: true

  # Optional TX worker tuning.
  # These can usually be omitted unless testing worker timing/stability.
  tx_worker_start_delay_ms: 5000
  tx_worker_stack_size: 6144
  tx_worker_priority: 4
  tx_worker_core_id: 1

  # Optional.
  room_temp_timeout: 60