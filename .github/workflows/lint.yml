name: Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'rewrite/**'
      - 'feature/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint

      - name: Run lint
        run: scripts/lint.sh check
