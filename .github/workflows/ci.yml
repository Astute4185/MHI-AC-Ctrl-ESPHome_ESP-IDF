name: CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ESPHOME_VERSION: "2026.6.2"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format shellcheck
          python -m pip install --upgrade pip
          python -m pip install ruff yamllint

      - name: Run lint checks
        run: ./scripts/lint.sh

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++

      - name: Run unit tests
        run: ./scripts/test.sh

  esphome-tests:
    name: esphome-tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-ci.txt

      - name: Validate all configurations
        run: ./scripts/compile-tests.sh validate

      - name: Compile representative configurations
        if: github.event_name == 'pull_request'
        run: ./scripts/compile-tests.sh smoke

      - name: Compile complete matrix
        if: github.event_name == 'workflow_dispatch'
        run: ./scripts/compile-tests.sh full\
